<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarkItDown Converter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ── drop zone ──────────────────────────────────────────────── */
    #drop-zone.drag-over {
      border-color: #6366f1;
      background-color: #eef2ff;
    }
    #drop-zone.has-file {
      border-color: #22c55e;
      background-color: #f0fdf4;
    }

    /* ── log panel ──────────────────────────────────────────────── */
    #log-panel {
      font-family: "Cascadia Code", "Fira Code", "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.8rem;
      line-height: 1.5;
      resize: vertical;
    }
    #log-panel .log-info  { color: #2563eb; }
    #log-panel .log-done  { color: #16a34a; }
    #log-panel .log-warn  { color: #d97706; }
    #log-panel .log-error { color: #dc2626; }

    /* ── preview pane ───────────────────────────────────────────── */
    #preview {
      font-family: "Cascadia Code", "Fira Code", "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      tab-size: 2;
    }
    /* lightweight Markdown-like syntax hint */
    #preview .hl-heading { color: #7c3aed; font-weight: 600; }
    #preview .hl-list   { color: #059669; }
    #preview .hl-code   { color: #b45309; }
    #preview .hl-link   { color: #2563eb; text-decoration: underline; }
    #preview .hl-bold   { font-weight: 700; }
    #preview .hl-hr     { color: #9ca3af; }

    /* ── scrollbar styling ──────────────────────────────────────── */
    .thin-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .thin-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .thin-scroll::-webkit-scrollbar-track { background: transparent; }

    /* ── utility ────────────────────────────────────────────────── */
    .btn-primary {
      background: #4f46e5;
      color: #fff;
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      font-weight: 600;
      transition: background .15s;
    }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }
    .btn-secondary {
      background: #fff;
      color: #374151;
      border: 1px solid #d1d5db;
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      font-weight: 500;
      transition: background .15s;
    }
    .btn-secondary:hover { background: #f3f4f6; }
    .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body class="h-full bg-gray-50 text-gray-800 font-sans antialiased flex flex-col">
  <!-- ── header ─────────────────────────────────────────────────── -->
  <header class="bg-gradient-to-r from-indigo-600 to-indigo-500 text-white px-6 py-4 shadow">
    <div class="max-w-6xl mx-auto flex items-center gap-3">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
      </svg>
      <h1 class="text-xl font-bold tracking-tight">MarkItDown Converter</h1>
      <span class="text-indigo-200 text-sm ml-auto">Microsoft MarkItDown GUI</span>
    </div>
  </header>

  <main class="flex-1 max-w-6xl mx-auto w-full p-4 sm:p-6 flex flex-col gap-4 overflow-hidden">
    <!-- ── drop zone ─────────────────────────────────────────────── -->
    <section
      id="drop-zone"
      class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer
             transition-colors duration-150"
      tabindex="0"
      role="button"
      aria-label="Select or drop a file"
    >
      <div id="drop-placeholder" class="text-gray-400">
        <svg class="w-10 h-10 mx-auto mb-2" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
        </svg>
        <p class="text-sm font-medium">Drop a file here, or click to browse</p>
        <p class="text-xs mt-1">PDF &middot; Word &middot; Excel &middot; PowerPoint &middot; Images &middot; Audio &middot; HTML &middot; CSV &middot; JSON &middot; ZIP &amp; more</p>
      </div>
      <div id="drop-fileinfo" class="hidden text-left">
        <p class="text-sm font-semibold text-gray-700 flex items-center gap-2">
          <svg class="w-5 h-5 text-green-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span id="file-name" class="truncate"></span>
        </p>
        <p id="file-size" class="text-xs text-gray-400 mt-0.5 ml-7"></p>
      </div>
    </section>

    <!-- ── LLM settings ─────────────────────────────────────────── -->
    <section class="flex flex-col gap-3">
      <!-- always-visible row -->
      <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center">
        <div class="flex-1 w-full sm:w-auto">
          <label for="api-key" class="block text-xs font-medium text-gray-500 mb-1">OpenAI API Key
            <span class="text-gray-400 font-normal">(optional — for image/LLM features)</span></label>
          <input id="api-key" type="password" placeholder="sk-..."
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent" />
        </div>
        <div class="w-full sm:w-44">
          <label for="llm-toggle" class="block text-xs font-medium text-gray-500 mb-1">LLM Assist</label>
          <select id="llm-toggle"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent">
            <option value="disabled">Disabled</option>
            <option value="enabled">Enabled</option>
          </select>
        </div>
      </div>

      <!-- collapsible advanced section -->
      <div class="border border-gray-200 rounded-lg overflow-hidden">
        <button id="llm-advanced-toggle" type="button"
          class="flex items-center justify-between w-full px-4 py-2 text-sm text-gray-500 hover:bg-gray-50 transition-colors">
          <span class="font-medium">Advanced LLM Settings</span>
          <svg id="llm-chevron" class="w-4 h-4 transition-transform duration-150" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
        <div id="llm-advanced-body" class="hidden border-t border-gray-200 px-4 py-3 space-y-3">
          <div>
            <label for="llm-base-url" class="block text-xs font-medium text-gray-500 mb-1">Base URL</label>
            <input id="llm-base-url" type="text" placeholder="https://api.openai.com/v1"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent" />
          </div>
          <div>
            <label for="llm-model" class="block text-xs font-medium text-gray-500 mb-1">Model</label>
            <input id="llm-model" type="text" placeholder="gpt-4o"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent" />
          </div>
        </div>
      </div>
    </section>

    <!-- ── action bar ────────────────────────────────────────────── -->
    <section class="flex items-center gap-4">
      <button id="btn-convert" class="btn-primary flex items-center gap-2" disabled>
        <svg id="spinner" class="w-4 h-4 hidden animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        <span id="btn-text">Start Conversion</span>
      </button>
      <span id="status-badge" class="text-sm text-gray-400 hidden"></span>
    </section>

    <!-- ── split pane ────────────────────────────────────────────── -->
    <section class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4 min-h-0">
      <!-- left — log panel -->
      <div class="flex flex-col min-h-0">
        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Log</h2>
        <div
          id="log-panel"
          class="flex-1 bg-gray-900 text-gray-100 rounded-lg p-3 overflow-y-auto thin-scroll
                 border border-gray-700"
        ></div>
      </div>

      <!-- right — preview -->
      <div class="flex flex-col min-h-0">
        <div class="flex items-center justify-between mb-1">
          <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Preview</h2>
          <span id="preview-stats" class="text-xs text-gray-400"></span>
        </div>
        <pre
          id="preview"
          class="flex-1 bg-white rounded-lg p-3 overflow-y-auto thin-scroll border border-gray-200
                 text-gray-800"
        ><code id="preview-code" class="text-gray-400">No output yet — select a file and click "Start Conversion".</code></pre>
      </div>
    </section>

    <!-- ── export buttons ────────────────────────────────────────── -->
    <section class="flex gap-3 pb-2">
      <button id="btn-save" class="btn-secondary flex items-center gap-1.5 text-sm" disabled>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 15V3"/>
        </svg>
        Save as .md
      </button>
      <button id="btn-copy" class="btn-secondary flex items-center gap-1.5 text-sm" disabled>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        Copy to Clipboard
      </button>
    </section>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
